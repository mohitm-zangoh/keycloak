version: '3.8'

services:
  postgres:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  keycloak:
    build:
      context: .
      dockerfile: Dockerfile
    # Running in production mode (start) and auto-importing realm if it doesn't exist
    command: start --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Enable HTTP (turns off the strict HTTPS requirement)
      KC_HTTP_ENABLED: 'true'
      # Disable strict hostname checking so it works locally on localhost/IP
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      # Tell Keycloak it is running behind a reverse proxy (like ngrok or localtunnel)
      KC_PROXY_HEADERS: 'xforwarded'
      # Disable theme caching for development
      KC_SPI_THEME_STATIC_MAX_AGE: '-1'
      KC_SPI_THEME_CACHE_THEMES: 'false'
      KC_SPI_THEME_CACHE_TEMPLATES: 'false'
    ports:
      - "8080:8080"
    volumes:
      - ./themes:/opt/keycloak/themes
      - ./realm-export-with-users.json:/opt/keycloak/data/import/realm.json
    depends_on:
      - postgres

volumes:
  postgres_data:
